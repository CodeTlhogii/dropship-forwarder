<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dropship Forwarder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white'>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .reset-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo a {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .back-link {
            text-align: center;
            margin-top: 16px;
        }
        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .success-box {
            background: #ecfdf5;
            border: 1px solid #6ee7b7;
            border-radius: 10px;
            padding: 24px;
            text-align: center;
        }
        .success-box .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .success-box h3 {
            color: #065f46;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .success-box p {
            color: #047857;
            font-size: 14px;
        }
        .error-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            margin-top: 12px;
        }
        .error-box p {
            color: #dc2626;
            font-size: 14px;
        }
        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 16px; }
        .hidden { display: none !important; }
        .flex-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="reset-container">
    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <a href="/">Dropship Forwarder</a>
            <p class="subtitle">Create a new password</p>
        </div>

        <!-- Validating State -->
        <div id="validating" class="text-center py-8">
            <div class="spinner"></div>
            <p class="text-gray-500 text-sm mt-4">Validating your reset link...</p>
        </div>

        <!-- Reset Form -->
        <div id="resetForm" class="hidden">
            <p class="text-gray-600 text-sm mb-4">Enter your new password below.</p>
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Min 6 characters" autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter new password" autocomplete="new-password">
            </div>
            
            <button onclick="resetPassword()" class="btn-primary" id="resetBtn">Reset Password</button>
            
            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>

        <!-- Success State -->
        <div id="successMessage" class="hidden">
            <div class="success-box">
                <div class="icon">✅</div>
                <h3>Password Reset Successful!</h3>
                <p>You can now log in with your new password.</p>
                <a href="login.html" class="btn-primary" style="display:inline-block;text-align:center;text-decoration:none;margin-top:16px;">Login Now</a>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorMessage" class="hidden">
            <div class="error-box">
                <p id="errorText"></p>
            </div>
            <div class="back-link mt-4">
                <a href="forgot-password.html">Request a new reset link</a>
            </div>
        </div>

    </div>
</div>

<script>
    const API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/api' 
        : 'https://dropship-forwarder-api.onrender.com/api';
    
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (!token) {
        showError('Invalid reset link. Please request a new one.');
        document.getElementById('validating').classList.add('hidden');
    } else {
        validateToken(token);
    }
    
    async function validateToken(token) {
        try {
            const response = await axios.get(`${API_URL}/password-reset/verify/${token}`);
            
            if (response.data.valid) {
                document.getElementById('validating').classList.add('hidden');
                document.getElementById('resetForm').classList.remove('hidden');
            }
        } catch (error) {
            document.getElementById('validating').classList.add('hidden');
            showError(error.response?.data?.error || 'Invalid or expired reset link. Please request a new one.');
        }
    }
    
    async function resetPassword() {
        const password = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('resetBtn');
        
        // Reset error
        document.getElementById('errorMessage').classList.add('hidden');
        
        if (!password || password.length < 6) {
            showError('Password must be at least 6 characters');
            return;
        }
        
        if (password !== confirm) {
            showError('Passwords do not match');
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Resetting...';
        
        try {
            const response = await axios.post(`${API_URL}/password-reset/reset`, {
                token: token,
                password: password
            });
            
            if (response.data.success) {
                document.getElementById('resetForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
            }
        } catch (error) {
            showError(error.response?.data?.error || 'Failed to reset password. Please try again.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.classList.remove('hidden');
        setTimeout(() => {
            errorDiv.classList.add('hidden');
        }, 8000);
    }
</script>

</body>
</html>
