<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dropship Forwarder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white'>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { 
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .reset-container {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                    Dropship Forwarder
                </a>
                <p class="text-gray-600 mt-2">Create new password</p>
            </div>
            
            <!-- Token Validation -->
            <div id="validating" class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="text-gray-600 mt-4">Validating your reset link...</p>
            </div>
            
            <!-- Reset Form -->
            <div id="resetForm" class="hidden">
                <p class="text-sm text-gray-600 mb-4">Enter your new password below.</p>
                <input type="password" id="newPassword" placeholder="New password (min 6 chars)" class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <input type="password" id="confirmPassword" placeholder="Confirm new password" class="w-full border border-gray-300 rounded-lg px-4 py-3 mb-4 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <button onclick="resetPassword()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Reset Password</button>
            </div>
            
            <!-- Success -->
            <div id="successMessage" class="hidden">
                <div class="bg-green-50 border border-green-200 rounded-lg p-6 text-center">
                    <p class="text-green-700 text-lg font-semibold">✅ Password reset successful!</p>
                    <p class="text-gray-600 mt-2">You can now login with your new password.</p>
                    <a href="login.html" class="inline-block mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Login Now</a>
                </div>
            </div>
            
            <!-- Error -->
            <div id="errorMessage" class="hidden mt-4">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                    <p id="errorText" class="text-red-700"></p>
                    <a href="forgot-password.html" class="inline-block mt-3 text-blue-600 hover:underline text-sm">Request new link</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api' 
            : 'https://dropship-forwarder-api.onrender.com/api';
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            showError('Invalid reset link. Please request a new one.');
            document.getElementById('validating').classList.add('hidden');
        } else {
            validateToken(token);
        }
        
        async function validateToken(token) {
            try {
                const response = await axios.get(`${API_URL}/password-reset/verify/${token}`);
                
                if (response.data.valid) {
                    document.getElementById('validating').classList.add('hidden');
                    document.getElementById('resetForm').classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('validating').classList.add('hidden');
                showError(error.response?.data?.error || 'Invalid or expired reset link. Please request a new one.');
            }
        }
        
        async function resetPassword() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!password || password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            try {
                const response = await axios.post(`${API_URL}/password-reset/reset`, {
                    token: token,
                    password: password
                });
                
                if (response.data.success) {
                    document.getElementById('resetForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                }
            } catch (error) {
                showError(error.response?.data?.error || 'Failed to reset password. Please try again.');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 8000);
        }
    </script>
</body>
</html>
