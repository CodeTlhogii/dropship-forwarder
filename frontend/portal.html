    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
            
            <a href="landing.html" class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                Dropship Forwarder
            </a>
            <div class="hidden md:flex space-x-4">
    <a href="dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
    <a href="analytics.html" class="text-gray-600 hover:text-blue-600">Analytics</a>
    <a href="tracking.html" class="text-gray-600 hover:text-blue-600">Track</a>
    <a href="portal.html" class="text-blue-600 font-medium">Portal</a>
    <a href="affiliate.html" class="text-gray-600 hover:text-blue-600">Affiliate</a>
</div>
            <a href="index.html" class="text-blue-600 hover:underline">Login for Dropshippers</a>
            
        </div>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-4 py-12">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">📦 Customer Portal</h1>
        <p class="text-gray-600 mt-2">Track all your orders in one place</p>
    </div>
    
    <div class="bg-white rounded-lg shadow p-6 mb-8">
        <label class="block text-sm font-medium text-gray-700 mb-2">Enter your email to see your orders</label>
        <div class="flex gap-3">
            <input type="email" id="customerEmail" placeholder="your@email.com" class="flex-1 border rounded-lg px-4 py-2">
            <button onclick="lookupOrders()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                Find Orders →
            </button>
        </div>
    </div>
    
    <div id="ordersList" class="space-y-4"></div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api';
    
    async function lookupOrders() {
        const email = document.getElementById('customerEmail').value;
        if (!email) {
            alert('Please enter your email');
            return;
        }
        
        const ordersDiv = document.getElementById('ordersList');
        ordersDiv.innerHTML = '<div class="text-center py-8 text-gray-500">Loading your orders...</div>';
        
        try {
            const response = await axios.get(`${API_URL}/portal/orders/${encodeURIComponent(email)}`);
            const orders = response.data.orders;
            
            if (orders.length === 0) {
                ordersDiv.innerHTML = '<div class="bg-white rounded-lg shadow p-8 text-center text-gray-500">No orders found for this email</div>';
                return;
            }
            
            ordersDiv.innerHTML = orders.map(order => `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-start flex-wrap gap-4">
                        <div>
                            <h3 class="font-bold text-lg">${order.product_name}</h3>
                            <p class="text-sm text-gray-500">Order #${order.id} • ${new Date(order.created_at).toLocaleDateString()}</p>
                            <p class="text-sm text-gray-600">Value: R${order.product_value}</p>
                            ${order.tracking_number ? `<p class="text-sm text-blue-600 mt-1">Tracking: ${order.tracking_number}</p>` : ''}
                        </div>
                        <div class="text-right">
                            <span class="px-3 py-1 rounded-full text-sm ${getStatusColor(order.status)}">
                                ${formatStatus(order.status)}
                            </span>
                            ${order.tracking_number ? `
                                <button onclick="window.open('tracking.html?tracking=${order.tracking_number}', '_blank')" 
                                        class="block mt-2 text-blue-600 text-sm hover:underline">
                                    Track Package →
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
        } catch (error) {
            ordersDiv.innerHTML = '<div class="bg-red-50 p-4 rounded-lg text-red-700">Error loading orders</div>';
        }
    }
    
    function getStatusColor(status) {
        const colors = {
            'pending': 'bg-gray-200', 'received_cn': 'bg-yellow-200', 'consolidated': 'bg-blue-200',
            'customs_clearance': 'bg-purple-200', 'in_transit': 'bg-indigo-200', 'delivered': 'bg-green-200'
        };
        return colors[status] || 'bg-gray-200';
    }
    
    function formatStatus(status) {
        const map = { 'pending': 'Pending', 'received_cn': 'In China', 'consolidated': 'Consolidated',
            'customs_clearance': 'Customs', 'in_transit': 'In Transit', 'delivered': 'Delivered' };
        return map[status] || status;
    }
</script>
</body>

<!-- Navigation -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-14 sm:h-16">
            <a href="/" class="text-lg sm:text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent flex-shrink-0">
                Dropship Forwarder
            </a>
            <div class="hidden md:flex items-center space-x-6 lg:space-x-8">
                <a href="dashboard.html" class="text-blue-600 font-medium text-sm">Dashboard</a>
                <a href="analytics.html" class="text-gray-700 hover:text-blue-600 transition text-sm">Analytics</a>
                <a href="tracking.html" class="text-gray-700 hover:text-blue-600 transition text-sm">Track</a>
                <a href="portal.html" class="text-gray-700 hover:text-blue-600 transition text-sm">Portal</a>
                <a href="affiliate.html" class="text-gray-700 hover:text-blue-600 transition text-sm">Affiliate</a>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600 transition">Logout</button>
            </div>
            <div class="md:hidden flex items-center gap-2">
                <button onclick="logout()" class="px-3 py-1.5 text-xs bg-red-500 text-white rounded-lg hover:bg-red-600 transition">Logout</button>
                <div class="hamburger ml-1" onclick="toggleMobileMenu()">
                    <div class="w-6 h-0.5 bg-gray-800 my-1.5"></div>
                    <div class="w-6 h-0.5 bg-gray-800 my-1.5"></div>
                    <div class="w-6 h-0.5 bg-gray-800 my-1.5"></div>
                </div>
            </div>
        </div>
        <div id="mobileMenu" class="mobile-menu md:hidden bg-white border-t border-gray-100">
            <div class="py-3 space-y-1">
                <a href="dashboard.html" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition" onclick="closeMobileMenu()">Dashboard</a>
                <a href="analytics.html" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition" onclick="closeMobileMenu()">Analytics</a>
                <a href="tracking.html" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition" onclick="closeMobileMenu()">Track</a>
                <a href="portal.html" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition" onclick="closeMobileMenu()">Portal</a>
                <a href="affiliate.html" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition" onclick="closeMobileMenu()">Affiliate</a>
                <div class="border-t border-gray-100 pt-3 mt-2 px-3">
                    <button onclick="logout()" class="w-full text-center px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition text-sm">Logout</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<style>
    .mobile-menu { transition: all 0.3s ease; max-height: 0; overflow: hidden; }
    .mobile-menu.open { max-height: 500px; }
    .hamburger { cursor: pointer; display: flex; flex-direction: column; align-items: center; }
    .hamburger div { transition: all 0.3s ease; width: 24px; height: 2px; background: #1f2937; margin: 3px 0; border-radius: 2px; }
    .hamburger.active div:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active div:nth-child(2) { opacity: 0; }
    .hamburger.active div:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
</style>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        const hamburger = document.querySelector('.hamburger');
        if (menu) {
            menu.classList.toggle('open');
            if (hamburger) hamburger.classList.toggle('active');
        }
    }
    function closeMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        const hamburger = document.querySelector('.hamburger');
        if (menu) {
            menu.classList.remove('open');
            if (hamburger) hamburger.classList.remove('active');
        }
    }
    window.addEventListener('resize', function() {
        if (window.innerWidth >= 768) { closeMobileMenu(); }
    });
    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/';
    }
</script>


</html>
