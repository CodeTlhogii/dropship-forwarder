<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropship Forwarder - Login</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white'>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100">


        <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">
            <a href="landing.html" class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                Dropship Forwarder
            </a>
            <div class="flex space-x-4">
                <a href="landing.html" class="text-gray-600 hover:text-blue-600">Home</a>
                <a href="portal.html" class="text-gray-600 hover:text-blue-600">Track Order</a>
                <a href="register.html" class="text-blue-600 hover:underline">Sign Up</a>
            </div>
        </div>
    </div>
</nav>

    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-600">Dropship Forwarder</h1>
                <p class="text-gray-600 mt-2">Freight forwarding for dropshippers</p>
            </div>
            
            <div id="loginForm">
                <h2 class="text-xl font-bold mb-4">Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" class="w-full border rounded px-3 py-2 mb-3">
                <input type="password" id="loginPassword" placeholder="Password" class="w-full border rounded px-3 py-2 mb-4">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
                <p class="text-center text-sm text-gray-600 mt-4">
                    Don't have an account? 
                    <button onclick="showRegister()" class="text-blue-600 hover:underline">Register</button>
                </p>
            </div>
            
            <div id="registerForm" class="hidden">
                <h2 class="text-xl font-bold mb-4">Register</h2>
                <input type="email" id="regEmail" placeholder="Email" class="w-full border rounded px-3 py-2 mb-3">
                <input type="text" id="regCompany" placeholder="Company Name" class="w-full border rounded px-3 py-2 mb-3">
                <input type="tel" id="regPhone" placeholder="Phone" class="w-full border rounded px-3 py-2 mb-3">
                <input type="password" id="regPassword" placeholder="Password (min 6 chars)" class="w-full border rounded px-3 py-2 mb-4">
                <button onclick="register()" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Register</button>
                <p class="text-center text-sm text-gray-600 mt-4">
                    Already have an account? 
                    <button onclick="showLogin()" class="text-blue-600 hover:underline">Login</button>
                </p>
            </div>
            
            <div id="message" class="mt-4 text-center text-sm hidden"></div>
        </div>
    </div>

    <script>


         // Add this to the top of the script section in index.html
// Capture referral code from URL
const urlParams = new URLSearchParams(window.location.search);
const referralCode = urlParams.get('ref');
if (referralCode) {
    // Store it temporarily
    sessionStorage.setItem('referralCode', referralCode);
}

// When registering, include the referral code in the API call
async function register() {
    const email = document.getElementById('regEmail').value;
    const company_name = document.getElementById('regCompany').value;
    const phone = document.getElementById('regPhone').value;
    const password = document.getElementById('regPassword').value;
    
    // Get referral code
    const refCode = sessionStorage.getItem('referralCode') || '';
    
    if (password.length < 6) {
        showMessage('Password must be at least 6 characters', 'red');
        return;
    }
    
    try {
        // Build URL with referral parameter
        let url = `${API_URL}/auth/register`;
        if (refCode) {
            url += `?ref=${refCode}`;
        }
        
        const response = await axios.post(url, {
            email, password, company_name, phone
        });
        localStorage.setItem('token', response.data.token);
        
        // Clear referral code
        sessionStorage.removeItem('referralCode');
        
        window.location.href = 'dashboard.html';
    } catch (error) {
        showMessage(error.response?.data?.error || 'Registration failed', 'red');
    }
}


        const API_URL = 'http://localhost:3000/api';
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await axios.post(`${API_URL}/auth/login`, { email, password });
                localStorage.setItem('token', response.data.token);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showMessage(error.response?.data?.error || 'Login failed', 'red');
            }
        }
        
        async function register() {
            const email = document.getElementById('regEmail').value;
            const company_name = document.getElementById('regCompany').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'red');
                return;
            }
            
            try {
                const response = await axios.post(`${API_URL}/auth/register`, {
                    email, password, company_name, phone
                });
                localStorage.setItem('token', response.data.token);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showMessage(error.response?.data?.error || 'Registration failed', 'red');
            }
        }
        
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }
        
        function showMessage(msg, color) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `mt-4 text-center text-sm p-2 rounded ${color === 'red' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} not-hidden`;
            setTimeout(() => {
                msgDiv.classList.add('hidden');
            }, 3000);
        }
        
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
