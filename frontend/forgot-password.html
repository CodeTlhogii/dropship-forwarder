<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Dropship Forwarder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white'>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .forgot-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo a {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .back-link {
            text-align: center;
            margin-top: 16px;
        }
        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .success-box {
            background: #ecfdf5;
            border: 1px solid #6ee7b7;
            border-radius: 10px;
            padding: 24px;
            text-align: center;
        }
        .success-box .icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .success-box p {
            color: #047857;
            font-size: 14px;
        }
        .error-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            margin-top: 12px;
        }
        .error-box p {
            color: #dc2626;
            font-size: 14px;
        }
        .hidden { display: none !important; }
        .mt-4 { margin-top: 16px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<div class="forgot-container">
    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <a href="/">Dropship Forwarder</a>
            <p class="subtitle">Reset your password</p>
        </div>

        <!-- Request Form -->
        <div id="requestForm">
            <p class="text-gray-600 text-sm mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            
            <div class="form-group">
                <input type="email" id="resetEmail" placeholder="Email address" autocomplete="email">
            </div>
            
            <button onclick="requestReset()" class="btn-primary">Send Reset Link</button>
            
            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>

        <!-- Success State -->
        <div id="successMessage" class="hidden">
            <div class="success-box">
                <div class="icon">✅</div>
                <p>If an account exists with this email, you will receive a password reset link.</p>
                <div class="back-link mt-4">
                    <a href="login.html">Return to Login</a>
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorMessage" class="hidden">
            <div class="error-box">
                <p id="errorText"></p>
            </div>
        </div>

    </div>
</div>

<script>
    const API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/api' 
        : 'https://dropship-forwarder-api.onrender.com/api';
    
    async function requestReset() {
        const email = document.getElementById('resetEmail').value;
        const btn = event.target;
        
        document.getElementById('errorMessage').classList.add('hidden');
        
        if (!email) {
            showError('Please enter your email address');
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Sending...';
        
        try {
            await axios.post(`${API_URL}/password-reset/request`, { email });
            
            document.getElementById('requestForm').classList.add('hidden');
            document.getElementById('successMessage').classList.remove('hidden');
            
        } catch (error) {
            showError(error.response?.data?.error || 'Something went wrong. Please try again.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.classList.remove('hidden');
        setTimeout(() => {
            errorDiv.classList.add('hidden');
        }, 8000);
    }
</script>

</body>
</html>
