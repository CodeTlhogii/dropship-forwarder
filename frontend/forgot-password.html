<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Dropship Forwarder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%233b82f6'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white'>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Dropship Forwarder</a>
                <p class="text-gray-600 mt-2">Reset your password</p>
            </div>
            
            <div id="requestForm">
                <p class="text-sm text-gray-600 mb-4">Enter your email address and we'll send you a link to reset your password.</p>
                <input type="email" id="resetEmail" placeholder="Email address" class="w-full border rounded-lg px-4 py-3 mb-4">
                <button onclick="requestReset()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">Send Reset Link</button>
                <p class="text-center text-sm text-gray-600 mt-4">
                    <a href="login.html" class="text-blue-600 hover:underline">← Back to Login</a>
                </p>
            </div>
            
            <div id="successMessage" class="hidden">
                <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-center">
                    <p class="text-green-700">✅ If an account exists with this email, you will receive a password reset link.</p>
                    <p class="text-sm text-gray-600 mt-4">
                        <a href="login.html" class="text-blue-600 hover:underline">Return to Login</a>
                    </p>
                </div>
            </div>
            
            <div id="errorMessage" class="hidden mt-4">
                <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                    <p id="errorText" class="text-red-700"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api' 
            : 'https://dropship-forwarder-api.onrender.com/api';
        
        async function requestReset() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            try {
                const response = await axios.post(`${API_URL}/password-reset/request`, { email });
                
                document.getElementById('requestForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
                document.getElementById('errorMessage').classList.add('hidden');
                
            } catch (error) {
                showError(error.response?.data?.error || 'Something went wrong. Please try again.');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
